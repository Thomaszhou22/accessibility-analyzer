<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccessScan Extension</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      font-size: 14px;
      color: #1f2937;
      background: #ffffff;
    }
    
    .container {
      padding: 16px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
    
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 18px;
    }
    
    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
    }
    
    .url-display {
      background: #f3f4f6;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 16px;
      word-break: break-all;
      line-height: 1.4;
    }
    
    .url-label {
      font-weight: 500;
      color: #4b5563;
      margin-bottom: 4px;
    }
    
    .scan-button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .scan-button:hover {
      opacity: 0.9;
    }
    
    .scan-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .loading {
      text-align: center;
      padding: 32px 16px;
      color: #6b7280;
    }
    
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .results {
      margin-top: 16px;
    }
    
    .score-panel {
      background: #f9fafb;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      text-align: center;
    }
    
    .score-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 28px;
      font-weight: bold;
      color: white;
    }
    
    .score-excellent { background: #10b981; }
    .score-good { background: #3b82f6; }
    .score-needs-work { background: #f59e0b; }
    .score-poor { background: #ef4444; }
    
    .score-label {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .stats {
      display: flex;
      justify-content: space-around;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: bold;
      color: #111827;
    }
    
    .stat-label {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .issues-section {
      margin-top: 16px;
    }
    
    .issues-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #111827;
    }
    
    .issue-item {
      padding: 10px;
      background: #f9fafb;
      border-left: 3px solid;
      border-radius: 4px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    
    .issue-error { border-left-color: #ef4444; }
    .issue-warning { border-left-color: #f59e0b; }
    .issue-info { border-left-color: #3b82f6; }
    
    .issue-title {
      font-weight: 600;
      margin-bottom: 4px;
      color: #111827;
    }
    
    .issue-description {
      color: #6b7280;
      line-height: 1.4;
    }
    
    .full-report-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      padding: 10px;
      background: #f3f4f6;
      border-radius: 6px;
      color: #3b82f6;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }
    
    .full-report-link:hover {
      background: #e5e7eb;
    }
    
    .error-message {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 12px;
      border-radius: 6px;
      margin-top: 16px;
      font-size: 13px;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">A</div>
      <h1>AccessScan Extension</h1>
    </div>
    
    <div class="url-display">
      <div class="url-label">Current URL</div>
      <div id="currentUrl">Loading...</div>
    </div>
    
    <button id="scanButton" class="scan-button">Scan Current Page</button>
    
    <div id="loadingSection" class="loading hidden">
      <div class="spinner"></div>
      <div>Scanning for accessibility issues...</div>
    </div>
    
    <div id="resultsSection" class="results hidden">
      <div class="score-panel">
        <div id="scoreCircle" class="score-circle">0</div>
        <div id="scoreLabel" class="score-label">Score</div>
        <div class="stats">
          <div class="stat">
            <div id="errorCount" class="stat-value">0</div>
            <div class="stat-label">Errors</div>
          </div>
          <div class="stat">
            <div id="warningCount" class="stat-value">0</div>
            <div class="stat-label">Warnings</div>
          </div>
          <div class="stat">
            <div id="totalCount" class="stat-value">0</div>
            <div class="stat-label">Total</div>
          </div>
        </div>
      </div>
      
      <div class="issues-section">
        <div class="issues-title">Top Issues</div>
        <div id="issuesList"></div>
      </div>
      
      <a id="fullReportLink" class="full-report-link" href="#" target="_blank">
        View Full Report
      </a>
    </div>
    
    <div id="errorSection" class="error-message hidden">
      <div id="errorMessage"></div>
    </div>
  </div>
  
  <script src="rules.js"></script>
  <script src="popup.js"></script>
</body>
</html>
